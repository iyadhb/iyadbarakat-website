<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="The same request briefed two ways: a one-liner prompt versus a structured GOAL brief">
  <rect width="1200" height="640" fill="#FAF9F6"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="700" fill="#1F3A5F">The same request, briefed two ways</text>

  <!-- ================= LEFT: ONE-LINER ================= -->
  <rect x="60" y="110" width="150" height="34" rx="17" fill="#E4E1D8"/>
  <text x="135" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#5B6B7C">ONE-LINER</text>

  <rect x="60" y="162" width="500" height="110" rx="8" fill="#FFFFFF" stroke="#E4E1D8" stroke-width="1.5"/>
  <text x="86" y="205" font-family="Inter, Arial, sans-serif" font-size="19" fill="#22303F">Give me a market entry strategy</text>
  <text x="86" y="235" font-family="Inter, Arial, sans-serif" font-size="19" fill="#22303F">for Southeast Asia.</text>

  <!-- arrow -->
  <line x1="310" y1="284" x2="310" y2="316" stroke="#9AA6B2" stroke-width="2"/>
  <path d="M303 310 L310 320 L317 310 Z" fill="#9AA6B2"/>

  <rect x="60" y="330" width="500" height="86" rx="8" fill="#F0EDE4" stroke="#E4E1D8" stroke-width="1.5"/>
  <text x="86" y="366" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5B6B7C">A generic essay on a region the</text>
  <text x="86" y="392" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5B6B7C">size of a continent. Useless to you.</text>

  <!-- ================= RIGHT: GOAL BRIEF ================= -->
  <rect x="640" y="110" width="190" height="34" rx="17" fill="#B8860B"/>
  <text x="735" y="132" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.5" fill="#FFFFFF">THE GOAL BRIEF</text>

  <rect x="640" y="162" width="500" height="292" rx="8" fill="#FFFFFF" stroke="#D4A017" stroke-width="2"/>

  <!-- Row G -->
  <circle cx="675" cy="205" r="17" fill="#1F3A5F"/>
  <text x="675" y="211" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#D4A017">G</text>
  <text x="708" y="200" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1F3A5F">Goal</text>
  <text x="708" y="222" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B6B7C">Market entry assessment for Southeast Asia</text>

  <!-- Row O -->
  <circle cx="675" cy="275" r="17" fill="#1F3A5F"/>
  <text x="675" y="281" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#D4A017">O</text>
  <text x="708" y="270" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1F3A5F">Output</text>
  <text x="708" y="292" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B6B7C">Executive briefing with clear recommendations</text>

  <!-- Row A -->
  <circle cx="675" cy="345" r="17" fill="#1F3A5F"/>
  <text x="675" y="351" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#D4A017">A</text>
  <text x="708" y="340" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1F3A5F">Audience</text>
  <text x="708" y="362" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B6B7C">PE investment committee — financially fluent</text>

  <!-- Row L -->
  <circle cx="675" cy="415" r="17" fill="#1F3A5F"/>
  <text x="675" y="421" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#D4A017">L</text>
  <text x="708" y="410" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1F3A5F">Leverage</text>
  <text x="708" y="432" font-family="Inter, Arial, sans-serif" font-size="15" fill="#5B6B7C">ROI focus; two-page max; include the risks</text>

  <!-- arrow -->
  <line x1="890" y1="466" x2="890" y2="498" stroke="#B8860B" stroke-width="2"/>
  <path d="M883 492 L890 502 L897 492 Z" fill="#B8860B"/>

  <rect x="640" y="512" width="500" height="86" rx="8" fill="#1F3A5F"/>
  <text x="890" y="551" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="600" fill="#FFFFFF">A two-page brief the committee</text>
  <text x="890" y="578" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="700" fill="#D4A017">can actually act on.</text>
</svg>
